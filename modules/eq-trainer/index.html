<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />

  <title>EQ Trainer | Live Sound Interactive Academy</title>
  <link rel="stylesheet" href="../../base.css" />

<body>
  <header>
    <a class="about-button" href="../../index.html">← Back to Academy</a>
    <h1 class="bilingual-title">
      <span class="title-en">EQ Trainer</span>
      <span class="title-zh">EQ 頻段聽感訓練</span>

        <div class="eq-trainer-placeholder__content">
          <span class="module-kicker">Module 2</span>

          <div class="eq-band-preview" id="eqBandPreview" aria-label="EQ 頻段預覽"></div>
        </div>
      </div>
    </section>

  <footer>
    <p>Live Sound Interactive Academy</p>
  </footer>
